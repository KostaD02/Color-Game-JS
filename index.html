<body>
    <main>
        <p id="RGBcodeID">Choose option</p>
        <div class="buttons">
            <div class="left">
                <div class="generateColor">
                    <div class="wrapper">
                        <p class="GenerateColor" onclick=""><span>Generate Color</span></p>
                    </div>
                </div>
            </div>
            <div class="rigth">
                <div class="rigthOne">
                    <div class="wrapper">
                        <p onclick=""><span>Easy</span></p>
                    </div>
                </div>
                <div class="rigthSecond">
                    <div class="wrapper">
                        <p onclick=""><span>Medium</span></p>
                    </div>
                </div>
                <div class="rigthThree">
                    <div class="wrapper">
                        <p onclick=""><span>Hard</span></p>
                    </div>
                </div>
            </div>
        </div>
        <div class="colors">
            <div class="top">
                <div class="topLeft">
                    <div class="box" id="topLeft">

                    </div>
                </div>
                <div class="topMiddle">
                    <div class="box" id="topMiddle">

                    </div>
                </div>
                <div class="topRigth">
                    <div class="box" id="topRigth">

                    </div>
                </div>
            </div>
            <div class="middle">
                <div class="middleLeft">
                    <div class="box" id="middleLeft">

                    </div>
                </div>
                <div class="middleMiddle">
                    <div class="box" id="middleMiddle">

                    </div>
                </div>
                <div class="middleRigth">
                    <div class="box" id="middleRigth">

                    </div>
                </div>
            </div>
            <div class="bottom">
                <div class="bottomLeft">
                    <div class="box" id="bottomLeft">

                    </div>
                </div>
                <div class="bottomMiddle">
                    <div class="box" id="bottomMiddle">

                    </div>
                </div>
                <div class="bottomRigth">
                    <div class="box" id="bottomRigth">

                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="./main.js"></script>
